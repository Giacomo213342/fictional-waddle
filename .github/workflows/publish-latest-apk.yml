name: Publish latest APK

on:
  push:
    paths:
      - .github/workflows/publish-latest-apk.yml
  workflow_run:
    workflows:
      - Build APK
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download verified APK artifact
        uses: actions/download-artifact@v4
        with:
          name: polycule-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '760fba77ddbec0bcc310c4372841358539913aec' }}
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || 29548881323 }}

      - name: Publish rolling APK release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '760fba77ddbec0bcc310c4372841358539913aec' }}
        shell: bash
        run: |
          APK=dist/polycule-arm64-v8a-release-aligned.apk
          test -s "$APK"
          if gh release view latest-apk --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload latest-apk "$APK" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit latest-apk \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest signed ARM64 APK" \
              --notes "Signed ARM64 APK built and verified from commit $HEAD_SHA."
          else
            gh release create latest-apk "$APK" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$HEAD_SHA" \
              --title "Latest signed ARM64 APK" \
              --notes "Signed ARM64 APK built and verified from commit $HEAD_SHA." \
              --prerelease
          fi
