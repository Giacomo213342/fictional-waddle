name: Publish v0.4.0 release

on:
  workflow_run:
    workflows:
      - Build APK
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Download verified APK artifact
        uses: actions/download-artifact@v4
        with:
          name: polycule-${{ github.event.workflow_run.head_sha }}
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Publish stable v0.4.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v0.4.0"
          APK_SOURCE="dist/polycule-arm64-v8a-release-aligned.apk"
          APK_RELEASE="dist/polycule-v0.4.0-arm64-v8a.apk"
          TITLE="Polycule v0.4.0"
          printf -v NOTES \
            'Stable Android v0.4.0 release from commit %s.\n\nBuild: https://github.com/%s/actions/runs/%s' \
            "$HEAD_SHA" "$GITHUB_REPOSITORY" "$RUN_ID"
          test -s "$APK_SOURCE"
          mv "$APK_SOURCE" "$APK_RELEASE"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG" "$APK_RELEASE" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$HEAD_SHA" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease=false \
              --latest
          else
            gh release create "$TAG" "$APK_RELEASE" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$HEAD_SHA" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
