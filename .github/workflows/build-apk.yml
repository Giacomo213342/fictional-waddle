name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/polycule_client/flutter-dockerimages:3.35.7-android
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
      CP_HOME_DIR: ${{ github.workspace }}/.pod-cache
      KEY_BASE64: ${{ secrets.KEY_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS || secrets.KEY_ALIAS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and validate signing key
        shell: bash
        run: |
          if [[ -z "$KEY_BASE64" ]]; then
            echo "KEY_BASE64 is required to sign the APK" >&2
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$KEY_BASE64" | base64 --decode > android/app/keystore.jks
          test -s android/app/keystore.jks
          keytool -list \
            -keystore android/app/keystore.jks \
            -storepass "${KEYSTORE_PASSWORD:-password}" \
            -alias "${KEY_ALIAS:-alias_name}" > /dev/null

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: .pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Resolve Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build ARM64 APK
        shell: bash
        run: |
          export POLYCULE_VERSION="$(git describe --always)"
          BUILD_NUMBER=$((200000000 + GITHUB_RUN_NUMBER))
          if ((BUILD_NUMBER > 209999999)); then
            echo "Android build number range exhausted: $BUILD_NUMBER" >&2
            exit 1
          fi
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --build-number "$BUILD_NUMBER" \
            --dart-define=POLYCULE_IS_STABLE=false \
            --dart-define=POLYCULE_VERSION="$POLYCULE_VERSION" \
            --dart-define=no_default_http_client=true \
            --dart-define=cronetHttpNoPlay=true

      - name: Align, sign and verify APK
        shell: bash
        run: |
          KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-password}"
          KEY_PASSWORD="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
          KEY_ALIAS="${KEY_ALIAS:-alias_name}"
          zipalign -p -f 4 \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            polycule-arm64-v8a-release-aligned.apk
          apksigner sign \
            --ks android/app/keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            polycule-arm64-v8a-release-aligned.apk
          apksigner verify --verbose --print-certs \
            polycule-arm64-v8a-release-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: polycule-${{ github.sha }}
          path: polycule-arm64-v8a-release-aligned.apk
          if-no-files-found: error
          retention-days: 30
