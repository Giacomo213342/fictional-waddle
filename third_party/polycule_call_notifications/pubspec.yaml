name: polycule_call_notifications
description: Lockscreen-isolated Android incoming call notifications for Polycule.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: business.braid.polycule.callnotifications
        pluginClass: PolyculeCallNotificationsPlugin
