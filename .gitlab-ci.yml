variables:
  FLUTTER_VERSION: 3.35.7

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - build

build:apk:
  stage: build
  image: registry.gitlab.com/polycule_client/flutter-dockerimages:$FLUTTER_VERSION-android
  tags:
    - saas-linux-medium-amd64
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  before_script:
    - export PUB_CACHE="$CI_PROJECT_DIR/.pub-cache"
    - export CP_HOME_DIR="$CI_PROJECT_DIR/.pod-cache"
    - flutter pub get --enforce-lockfile
    - flutter gen-l10n
    - mkdir -p android/app
    - |
      if [ -f "${KEY_BASE64:-}" ]; then
        base64 -d "$KEY_BASE64" > android/app/keystore.jks
      elif [ -n "${KEY_BASE64:-}" ]; then
        printf '%s' "$KEY_BASE64" | base64 -d > android/app/keystore.jks
      else
        echo "KEY_BASE64 is required to sign build:apk" >&2
        exit 1
      fi
    - |
      if [ -f "${KEYSTORE_PASS_FILE:-}" ]; then
        export KEYSTORE_PASSWORD="$(cat "$KEYSTORE_PASS_FILE")"
      else
        export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-password}"
      fi
      if [ -f "${KEYSTORE_KEY_FILE:-}" ]; then
        export KEY_PASSWORD="$(cat "$KEYSTORE_KEY_FILE")"
      else
        export KEY_PASSWORD="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
      fi
      export KEY_ALIAS="${KEYSTORE_ALIAS:-alias_name}"
  script:
    - export POLYCULE_VERSION="$(git describe --always)"
    - export FLUTTER_ARGS="--build-number $((CI_PIPELINE_ID / 100)) --dart-define=POLYCULE_IS_STABLE=false --dart-define=POLYCULE_VERSION=$POLYCULE_VERSION --dart-define=no_default_http_client=true --dart-define=cronetHttpNoPlay=true"
    - flutter build apk --release $FLUTTER_ARGS
    - zipalign -p -f 4 build/app/outputs/flutter-apk/app-release.apk polycule-release-aligned.apk
    - apksigner sign --ks android/app/keystore.jks --ks-pass "pass:$KEYSTORE_PASSWORD" --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASSWORD" polycule-release-aligned.apk
    - apksigner verify --verbose --print-certs polycule-release-aligned.apk
  artifacts:
    name: "polycule-$CI_COMMIT_SHORT_SHA"
    paths:
      - polycule-release-aligned.apk
    expire_in: 30 days
