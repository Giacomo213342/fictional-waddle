name: polycule
description: "A simple and beautiful matrix client written in Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.4 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  matrix: ^0.25.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Sono
      fonts:
        - asset: assets/fonts/sono.ttf
